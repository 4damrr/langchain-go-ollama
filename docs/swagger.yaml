basePath: /
definitions:
  main.Response:
    properties:
      count:
        type: integer
      data: {}
    type: object
  rag.IngestionRequest:
    properties:
      content:
        type: string
      name:
        type: string
    type: object
  rag.SearchRequest:
    properties:
      k:
        type: integer
      query:
        type: string
    type: object
  rag.UserInput:
    properties:
      query:
        items:
          type: string
        type: array
    type: object
  rag.VectorDocument:
    properties:
      collectionID:
        description: uuid (required)
        type: string
      content:
        description: document
        type: string
      customID:
        description: optional external id
        type: string
      metadata:
        additionalProperties: true
        description: cmetadata (jsonb)
        type: object
      vector:
        description: embedding
        items:
          format: float32
          type: number
        type: array
    type: object
  workflow.UserInput:
    properties:
      query:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This API runs LangGraph workflow with Ollama
  title: Weather Workflow API
  version: "1.0"
paths:
  /documents/ask:
    post:
      consumes:
      - application/json
      description: Retrieve relevant documents using vector search and generate an
        answer using LLM
      parameters:
      - description: RAG query request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rag.SearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ask question using RAG
      tags:
      - rag
  /documents/raw:
    post:
      consumes:
      - application/json
      description: Insert documents with embeddings into pgvector (LangChain schema)
      parameters:
      - description: Documents to insert
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rag.IngestionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Insert documents into vector store
      tags:
      - vector
  /documents/search:
    post:
      consumes:
      - application/json
      description: Perform vector similarity search using an embedded query and return
        top-k matching chunks
      parameters:
      - description: Search query request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rag.SearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/main.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/rag.VectorDocument'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Semantic similarity search
      tags:
      - vector
  /embed:
    post:
      consumes:
      - application/json
      description: Convert input text into embedding vector using Ollama
      parameters:
      - description: Text input
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rag.UserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Generate text embedding
      tags:
      - embedding
  /weather:
    post:
      consumes:
      - application/json
      description: Run LangGraph workflow for weather query
      parameters:
      - description: Weather Query
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/workflow.UserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get weather summary
      tags:
      - weather
swagger: "2.0"
